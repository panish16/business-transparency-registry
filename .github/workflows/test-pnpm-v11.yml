name: Test pnpm v11 upgrade
on:
  push:
    branches: [feat/upgrade-pnpm-v11]
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test-pnpm-v11.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test-pnpm-v11:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: btr-web/btr-main-app
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest-11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: btr-web/btr-main-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Prepare workspace layers
        run: |
          node_modules/.bin/nuxt prepare --rootDir ../btr-common-components 2>/dev/null || true
          node_modules/.bin/nuxt prepare --rootDir ../btr-layouts 2>/dev/null || true
        continue-on-error: true

      - name: Nuxt Prepare
        run: pnpm exec nuxt prepare 2>/dev/null || true
        continue-on-error: true

      - name: Build
        run: pnpm build

      - name: Report pnpm version
        run: pnpm --version
