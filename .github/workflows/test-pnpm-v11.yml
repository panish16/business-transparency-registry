name: Test pnpm v11 upgrade
on:
  push:
    branches: [feat/upgrade-pnpm-v11]
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test-pnpm-v11.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test-pnpm-v11:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: btr-web/btr-main-app
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest-11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: btr-web/btr-main-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Prepare
        run: |
          # Prepare layers first so main-app prepare can read them
          pnpm exec nuxt prepare --rootDir ../btr-common-components || true
          pnpm exec nuxt prepare --rootDir ../btr-layouts || true
          # Prepare main app (may internally re-process layers and clear their .nuxt/)
          pnpm exec nuxt prepare || true
          # Re-prepare layers after main app, in case it cleared their .nuxt/ dirs
          pnpm exec nuxt prepare --rootDir ../btr-common-components || true
          pnpm exec nuxt prepare --rootDir ../btr-layouts || true
          # Stub any still-missing .nuxt/tsconfig.json to prevent esbuild path errors
          for dir in ../btr-common-components ../btr-layouts; do
            mkdir -p "$dir/.nuxt"
            [ -f "$dir/.nuxt/tsconfig.json" ] || echo '{}' > "$dir/.nuxt/tsconfig.json"
          done
        continue-on-error: true

      - name: Build
        run: pnpm build

      - name: Report pnpm version
        run: pnpm --version
